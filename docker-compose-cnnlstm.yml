version: '3.8'
# ══════════════════════════════════════════════════════════════════
#  FL Finance Platform — CNN+LSTM v2 (amélioré)
#  Corrections :
#    - bank_c : 15 epochs → 5, LR réduit à 0.0001, batch 8
#    - MU_FEDPROX=0.1 sur tous les clients (terme proximal)
#    - Seuil de décision fixe 0.5 dans client.py (plus de seuil dynamique)
#    - Scheduler CosineAnnealingLR activé côté client
#  Lancement : docker compose up --build
# ══════════════════════════════════════════════════════════════════
services:

  fl-server:
    build: ./server
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./results:/app/results
      - ./certs:/certs
    environment:
      - NUM_ROUNDS=20
      - MIN_CLIENTS=4
      - MODEL_TYPE=cnnlstm
      - INPUT_DIM=37
      - THRESHOLD=0.5          # ← seuil fixe, plus de seuil dynamique EMA
    networks:
      - fl-network
    restart: on-failure
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s=socket.socket(); s.connect(('localhost',8080)); s.close()"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  # ── bank_a : dataset moyen, configuration standard ──────────────────────
  bank-a:
    build: ./client
    environment:
      - BANK_ID=bank_a
      - TRAIN_PATH=/app/data/train_A.parquet
      - TEST_PATH=/app/data/test_A.parquet
      - SERVER_ADDRESS=fl-server:8080
      - MODEL_TYPE=cnnlstm
      - LOCAL_EPOCHS=5
      - BATCH_SIZE=64
      - LR=0.001
      - INPUT_DIM=37
      - MU_FEDPROX=0.1         # ← FedProx activé
    volumes:
      - ./data:/app/data
      - ./certs:/certs
    depends_on:
      fl-server:
        condition: service_healthy
    networks:
      - fl-network
    restart: on-failure

  # ── bank_b : plus grand dataset, batch plus grand ────────────────────────
  bank-b:
    build: ./client
    environment:
      - BANK_ID=bank_b
      - TRAIN_PATH=/app/data/train_B.parquet
      - TEST_PATH=/app/data/test_B.parquet
      - SERVER_ADDRESS=fl-server:8080
      - MODEL_TYPE=cnnlstm
      - LOCAL_EPOCHS=5
      - BATCH_SIZE=128
      - LR=0.001
      - INPUT_DIM=37
      - MU_FEDPROX=0.1         # ← FedProx activé
    volumes:
      - ./data:/app/data
      - ./certs:/certs
    depends_on:
      fl-server:
        condition: service_healthy
    networks:
      - fl-network
    restart: on-failure

  # ── bank_c : PETIT DATASET — configuration entièrement révisée ───────────
  #   AVANT : LOCAL_EPOCHS=15, BATCH_SIZE=16, LR=0.0003
  #   APRÈS : LOCAL_EPOCHS=5,  BATCH_SIZE=8,  LR=0.0001
  #   Raison : 15 epochs sur ~4 000 samples = overfitting massif qui
  #            contamine l'agrégation globale. MU_FEDPROX plus élevé (0.2)
  #            pour coller davantage au modèle global.
  bank-c:
    build: ./client
    environment:
      - BANK_ID=bank_c
      - TRAIN_PATH=/app/data/train_C.parquet
      - TEST_PATH=/app/data/test_C.parquet
      - SERVER_ADDRESS=fl-server:8080
      - MODEL_TYPE=cnnlstm
      - LOCAL_EPOCHS=5          # ← était 15, réduit à 5
      - BATCH_SIZE=8            # ← très petit batch pour capturer les fraudes rares
      - LR=0.0001               # ← était 0.0003, réduit pour éviter l'overfitting
      - INPUT_DIM=37
      - MU_FEDPROX=0.2          # ← μ plus élevé : bank_c doit moins dériver
    volumes:
      - ./data:/app/data
      - ./certs:/certs
    depends_on:
      fl-server:
        condition: service_healthy
    networks:
      - fl-network
    restart: on-failure

  # ── bank_d : grand dataset, configuration stable ─────────────────────────
  bank-d:
    build: ./client
    environment:
      - BANK_ID=bank_d
      - TRAIN_PATH=/app/data/train_D.parquet
      - TEST_PATH=/app/data/test_D.parquet
      - SERVER_ADDRESS=fl-server:8080
      - MODEL_TYPE=cnnlstm
      - LOCAL_EPOCHS=5
      - BATCH_SIZE=128
      - LR=0.001
      - INPUT_DIM=37
      - MU_FEDPROX=0.1         # ← FedProx activé
    volumes:
      - ./data:/app/data
      - ./certs:/certs
    depends_on:
      fl-server:
        condition: service_healthy
    networks:
      - fl-network
    restart: on-failure

networks:
  fl-network:
    driver: bridge