version: '3.8'

services:
  fl-server:
    build: ./server
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./results:/app/results
      - ./certs:/certs
    environment:
      - NUM_ROUNDS=30        # augmenté : dataset petit → plus de rounds pour converger
      - MIN_CLIENTS=4
      - MODEL_TYPE=mlp
      - INPUT_DIM=37
    networks:
      - fl-network
    restart: on-failure
    healthcheck:
      test: ["CMD", "python3", "-c", "import os; exit(0 if os.path.exists('/tmp/fl_server_ready') else 1)"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  bank-a:
    # ~28k train — taille moyenne
    build: ./client
    environment:
      - BANK_ID=bank_a
      - TRAIN_PATH=/app/data/train_A.parquet
      - TEST_PATH=/app/data/test_A.parquet
      - SERVER_ADDRESS=fl-server:8080
      - MODEL_TYPE=mlp
      - LOCAL_EPOCHS=5
      - BATCH_SIZE=64        # réduit : meilleure généralisation sur dataset moyen
      - LR=0.001             # réduit : plus stable, évite l'overfitting
      - INPUT_DIM=37
    volumes:
      - ./data:/app/data
      - ./certs:/certs
    depends_on:
      fl-server:
        condition: service_healthy
    networks:
      - fl-network
    restart: on-failure

  bank-b:
    # ~32k train — plus grand silo
    build: ./client
    environment:
      - BANK_ID=bank_b
      - TRAIN_PATH=/app/data/train_B.parquet
      - TEST_PATH=/app/data/test_B.parquet
      - SERVER_ADDRESS=fl-server:8080
      - MODEL_TYPE=mlp
      - LOCAL_EPOCHS=5
      - BATCH_SIZE=128       # plus grand batch : silo plus grand, stable
      - LR=0.001
      - INPUT_DIM=37
    volumes:
      - ./data:/app/data
      - ./certs:/certs
    depends_on:
      fl-server:
        condition: service_healthy
    networks:
      - fl-network
    restart: on-failure

  bank-c:
    # ~16k train — plus petit silo
    build: ./client
    environment:
      - BANK_ID=bank_c
      - TRAIN_PATH=/app/data/train_C.parquet
      - TEST_PATH=/app/data/test_C.parquet
      - SERVER_ADDRESS=fl-server:8080
      - MODEL_TYPE=mlp
      - LOCAL_EPOCHS=15       # plus d'epochs locales : petit dataset, besoin de plus d'itérations
      - BATCH_SIZE=16        # petit batch : peu de fraudes, évite de les rater
      - LR=0.0003            # LR plus faible : petit dataset → risque d'overfitting élevé
      - INPUT_DIM=37
    volumes:
      - ./data:/app/data
      - ./certs:/certs
    depends_on:
      fl-server:
        condition: service_healthy
    networks:
      - fl-network
    restart: on-failure

  bank-d:
    # ~75k train — plus grand silo, très peu de fraudes (0.033%)
    build: ./client
    environment:
      - BANK_ID=bank_d
      - TRAIN_PATH=/app/data/train_D.parquet
      - TEST_PATH=/app/data/test_D.parquet
      - SERVER_ADDRESS=fl-server:8080
      - MODEL_TYPE=mlp
      - LOCAL_EPOCHS=5       # peu d'epochs : grand dataset, risque de surpoids dans l'agrégation
      - BATCH_SIZE=128       # grand batch : dataset grand, entraînement rapide
      - LR=0.001
      - INPUT_DIM=37
    volumes:
      - ./data:/app/data
      - ./certs:/certs
    depends_on:
      fl-server:
        condition: service_healthy
    networks:
      - fl-network
    restart: on-failure

networks:
  fl-network:
    driver: bridge